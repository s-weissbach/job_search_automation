# Job search configuration template — copy to config.yaml and fill in your preferences
# cp config.example.yaml config.yaml

search:
  keywords:
    - "your job title"
    - "related role"
  locations:
    - "Remote"
    - "Your City, Country"
  sites:
    - "linkedin"
    - "indeed"
  results_per_site: 20
  hours_old: 72
  country_indeed: "USA"        # Change to your country: Germany, UK, etc.
  # Set true to fetch full descriptions from LinkedIn (slower but better assessments)
  linkedin_fetch_description: false
  # Optional: map bare city names to countries for Workday portals
  # location_city_map:
  #   "Basel": "Switzerland"

assessment:
  # claude-haiku-4-5: fastest and cheapest (~$0.001 per run of 50 jobs)
  # claude-sonnet-4-6: higher quality, prompt caching activates at >2048 token CV
  model: "claude-haiku-4-5"
  # Model used for the one-time CV compression step
  compression_model: "claude-sonnet-4-6"
  min_score: 60
  # Truncate job descriptions to limit tokens per assessment
  max_description_chars: 4000
  # Skip jobs whose input exceeds this token count (counted before inference, no cost).
  max_input_tokens: 3000
  # Points deducted from non-industry jobs (academia, government, nonprofit).
  # Set to 0 to disable. Use --clear-score-cache after changing this.
  industry_malus: 15

output:
  results_dir: "results"

# Direct company portal scraping via Greenhouse/Lever JSON APIs and Workday CXS API.
company_portals:
  fetch_workday_descriptions: false
  fetch_successfactors_descriptions: true

  greenhouse:
    - token: "your-company-token"
      name: "Company Name"

  lever:
    - slug: "your-company-slug"
      name: "Company Name"

  successfactors:
    - base_url: "https://jobs.example.com"
      name: "Company Name"

  workday:
    - name: "Company Name"
      api_url: "https://tenant.wd3.myworkdayjobs.com/wday/cxs/tenant/BoardName/jobs"
