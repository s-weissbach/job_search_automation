# Job search configuration template — copy to config.yaml and fill in your preferences
# cp config.example.yaml config.yaml

search:
  keywords:
    - "your job title"
    - "related role"
  locations:
    - "Remote"
    - "Your City, Country"
  sites:
    - "linkedin"
    - "indeed"
  results_per_site: 20
  hours_old: 72
  country_indeed: "USA"        # Change to your country: Germany, UK, etc.
  # Set true to fetch full descriptions from LinkedIn (slower but better assessments)
  linkedin_fetch_description: false

assessment:
  # claude-haiku-4-5: fastest and cheapest (~$0.001 per run of 50 jobs)
  # claude-sonnet-4-6: higher quality, prompt caching activates at >2048 token CV
  model: "claude-haiku-4-5"
  # Model used for the one-time CV compression step
  compression_model: "claude-sonnet-4-6"
  min_score: 6
  # Truncate job descriptions to limit tokens per assessment
  max_description_chars: 4000

output:
  results_dir: "results"
