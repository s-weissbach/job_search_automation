# Job search configuration template — copy to config.yaml and fill in your preferences
# cp config.example.yaml config.yaml

search:
  keywords:
    - "your job title"
    - "related role"
  locations:
    - "Remote"
    - "Your City, Country"
  sites:
    - "linkedin"
    - "indeed"
  results_per_site: 20
  hours_old: 72
  country_indeed: "USA"        # Change to your country: Germany, UK, etc.
  # Set true to fetch full descriptions from LinkedIn (slower but better assessments)
  linkedin_fetch_description: false

assessment:
  # claude-haiku-4-5: fastest and cheapest (~$0.001 per run of 50 jobs)
  # claude-sonnet-4-6: higher quality, prompt caching activates at >2048 token CV
  model: "claude-haiku-4-5"
  # Model used for the one-time CV compression step
  compression_model: "claude-sonnet-4-6"
  min_score: 6
  # Truncate job descriptions to limit tokens per assessment
  max_description_chars: 4000
  # Skip jobs whose input exceeds this token count (counted before inference, no cost).
  # Prevents runaway calls on jobs with massive descriptions. Remove or set null to disable.
  max_input_tokens: 3000

output:
  results_dir: "results"

# Direct company portal scraping via Greenhouse/Lever JSON APIs and Workday CXS API.
# Remove or comment out sections you don't need.
company_portals:
  fetch_workday_descriptions: false  # true = better assessments but much slower

  # Greenhouse: token from boards-api.greenhouse.io/v1/boards/{token}/jobs
  # Not all companies use Greenhouse — check the careers page URL first
  # (Phenom People, iCIMS, SAP SuccessFactors are other common platforms)
  greenhouse:
    - token: "your-company-token"
      name: "Company Name"

  # Lever: slug from api.lever.co/v0/postings/{slug}
  lever:
    - slug: "your-company-slug"
      name: "Company Name"

  # Workday: find api_url by inspecting network requests on the careers page
  # (look for POST to .../wday/cxs/.../jobs)
  workday:
    - name: "Company Name"
      api_url: "https://tenant.wd3.myworkdayjobs.com/wday/cxs/tenant/BoardName/jobs"
