name: Weekly Job Search

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config.yaml from secret
        run: echo "${{ secrets.CONFIG_YAML }}" > config.yaml

      - name: Write compressed CV from secret
        run: |
          mkdir -p cv
          echo "${{ secrets.CV_YAML }}" > cv/cv_compressed.yaml

      - name: Run job search and scoring
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_search.py --html-report

      - name: Upload results to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python src/supabase_uploader.py results/.score_store.csv
