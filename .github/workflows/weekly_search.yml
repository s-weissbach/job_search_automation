name: Weekly Job Search

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Write config.yaml from secret
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: printf '%s' "$CONFIG_YAML" > config.yaml

      - name: Write compressed CV from secret
        env:
          CV_YAML: ${{ secrets.CV_YAML }}
        run: |
          mkdir -p cv
          printf '%s' "$CV_YAML" > cv/cv_compressed.yaml

      - name: Run job search and scoring
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 run_search.py --html-report

      - name: Upload results to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 src/supabase_uploader.py results/.score_store.csv
